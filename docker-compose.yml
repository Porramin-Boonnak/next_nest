version: '3.8'

services:
  # --- Database Services ---
  mysql:
    image: mysql:8.0
    container_name: mysql_db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: mydatabase
      MYSQL_USER: myuser
      MYSQL_PASSWORD: mypassword
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: phpmyadmin
    restart: always
    ports:
      - "8081:80" 
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: rootpassword
    depends_on:
      - mysql

  # --- Backend (NestJS) ---
  backend:
    build: ./backend/frist_nest
    container_name: nest_backend
    ports:
      - "3001:3000" 
    volumes:
      - ./backend/frist_nest:/app
      - /app/node_modules
    environment:
      DATABASE_HOST: mysql
      DATABASE_PORT: 3306
      DATABASE_USER: myuser
      DATABASE_PASSWORD: mypassword
      DATABASE_NAME: mydatabase
    depends_on:
      - mysql

  # --- Frontend (Next.js) ---
  frontend:
    build: ./frontend/frist-next
    container_name: next_frontend
    ports:
      - "3000:3000"
    volumes:
      - ./frontend/frist-next:/app
      - /app/node_modules
    depends_on:
      - backend

volumes:
  mysql_data: